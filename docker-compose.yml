services:
  app:
    build: .
    container_name: campaign-service
    ports:
      - "8080:8080"
    volumes:
      - ./src/main/resources/static/ad_data.csv:/data/ad_data.csv:ro
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - CAMPAIGN_CSV_PATH=/data/ad_data.csv
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

